<!DOCTYPE html>
<html>
<head>
  <title>Fullscreen Iframe</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
    }

    iframe {
      width: 100vw;
      height: 100vh;
      border: none;
      display: block;
    }
  </style>
</head>

<body>

<iframe src="https://sparticle999.github.io/SpaceCompany/"></iframe>

</body>
</html>
