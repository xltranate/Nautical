<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clicker Heroes Fullscreen</title>
    <style>
        /* This removes all borders and scrollbars from the browser */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: #000;
        }

        /* This forces the game to stretch to the edges */
        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <iframe 
        src="https://cdn.clickerheroes.com/gamebuild/index.php" 
        allow="autoplay; fullscreen; gamepad;" 
        allowfullscreen>
    </iframe>

</body>
</html>
