<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CivClicker Fullscreen</title>
    <style>
        /* Remove all default spacing around the edge of the screen */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden; /* Prevents double scrollbars */
            background-color: #000; /* Looks cleaner while loading */
        }

        /* Make the iframe fill the entire browser window */
        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            border: none;
        }
    </style>
</head>
<body>

    <iframe 
        src="https://civclicker.sourceforge.net/civclicker/civclicker.html" 
        allowfullscreen>
    </iframe>

</body>
</html>
