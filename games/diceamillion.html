  <script>
  const canvas = document.getElementById('canvas');

  const origSetProperty = canvas.style.setProperty.bind(canvas.style);
  canvas.style.setProperty = function(prop, val, priority) {
    if (prop === 'width' || prop === 'height') return;
    return origSetProperty(prop, val, priority);
  };

  ['width', 'height'].forEach(prop => {
    Object.defineProperty(canvas.style, prop, {
      set: function() {},
      get: function() { return ''; },
      configurable: true
    });
  });

  function scaleCanvas() {
    const cw = canvas.width;
    const ch = canvas.height;
    if (!cw || !ch) return;
    const scaleX = window.innerWidth / cw;
    const scaleY = window.innerHeight / ch;
    canvas.style.transform = `scale(${scaleX}, ${scaleY})`;
  }

  new MutationObserver(scaleCanvas).observe(canvas, { attributes: true, attributeFilter: ['width', 'height'] });
  window.addEventListener('resize', scaleCanvas);
  setInterval(scaleCanvas, 200);
  </script>

  <script>
  (async function() {
    const BASE = 'https://cdn.jsdelivr.net/gh/NotRexed/Unblocked-Games@latest/diceamillion/';
    const res = await fetch(BASE + 'runner.js');
    let text = await res.text();
    text = text.replace(/new Worker\(["']([^"']+)["']\)/g, (match, url) => {
      if (!url.startsWith('http')) return `new Worker("${BASE}${url}")`;
      return match;
    });
    const blob = new Blob([text], { type: 'application/javascript' });
    const script = document.createElement('script');
    script.src = URL.createObjectURL(blob);
    document.body.appendChild(script);
  })();
